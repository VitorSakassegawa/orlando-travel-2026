[build]
  # O comando atualizado que o Netlify vai rodar
  command = "bash scripts/build.sh"
  
  # A pasta que o Netlify deve publicar
  publish = "build/web"

[build.environment]
  FLUTTER_VERSION = "3.24.0"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https:; connect-src *;"
    Service-Worker-Allowed = "/"
